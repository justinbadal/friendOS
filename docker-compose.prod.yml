services:
  db:
    image: postgres:16
    container_name: postgres__friendos
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    image: ghcr.io/justinbadal/friendos-backend:latest
    container_name: backend__friendos
    command: bash scripts/start/app.sh
    env_file: .env
    environment:
      - DB_HOST=db
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/justinbadal/friendos-frontend:latest
    container_name: frontend__friendos
    ports:
      - "3000:3000"
    depends_on:
      - app
    environment:
      - VITE_OIDC_ISSUER=${OIDC_ISSUER}
      - VITE_OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
    restart: unless-stopped

volumes:
  postgres_data:
