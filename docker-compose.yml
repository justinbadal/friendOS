services:
  db:
    image: postgres:16
    container_name: postgres__friendos
    environment:
      POSTGRES_DB: friendos
      POSTGRES_USER: friendos
      POSTGRES_PASSWORD: friendos
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U friendos -d friendos"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend__friendos
    command: bash scripts/start/app.sh
    env_file:
      - ./backend/config/.env
    environment:
      - DB_HOST=db
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /root_project/app
        - action: sync+restart
          path: ./backend/migrations
          target: /root_project/migrations
        - action: rebuild
          path: ./backend/pyproject.toml

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend__friendos
    ports:
      - "3000:3000"
    depends_on:
      - app
    environment:
      - VITE_OIDC_ISSUER=https://id.fmmd.me
      - VITE_OIDC_CLIENT_ID=7d93e03e-348c-47d7-9db5-6baa65d694e2
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: rebuild
          path: ./frontend/package.json

volumes:
  postgres_data:
